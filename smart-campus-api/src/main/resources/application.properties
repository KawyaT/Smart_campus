# App
spring.application.name=smart-uni-api
server.port=8081

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=smart_campus_db

# JWT (use a long random secret in production; min ~32 bytes for HS256)
jwt.secret=${JWT_SECRET:SmartCampusDevSecretKeyMustBeAtLeast32BytesLongForHS256!!}
jwt.expiration-ms=86400000

# Google OAuth (set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET in .env; redirect URI in Google Cloud: http://localhost:8081/login/oauth2/code/google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=email

# Where to send the browser after Google login (SPA receives ?token= JWT)
app.oauth2.frontend-url=http://localhost:5173

# Logging (set com.smartcampus.security=DEBUG to see Google OIDC attributes)
logging.level.org.springframework=INFO
